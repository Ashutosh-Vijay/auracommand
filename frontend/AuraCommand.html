<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AuraCommand · Chinnaswamy Ops</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+Kannada:wght@400;500&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow-x: hidden; }
  body {
    background:
      radial-gradient(ellipse 120% 80% at 20% 0%, rgba(40, 30, 80, 0.15), transparent 60%),
      radial-gradient(ellipse 80% 60% at 100% 100%, rgba(20, 60, 60, 0.12), transparent 60%),
      #06090f;
    color: rgba(232, 240, 250, 0.95);
    font-family: 'Inter', system-ui, sans-serif;
  }
  #root {
    min-height: 100%; width: 100%;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
    pointer-events: none;
    z-index: 1;
  }
  #root { position: relative; z-index: 2; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(140,160,180,0.18); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(140,160,180,0.32); }

  button { font-family: inherit; }

  /* shared keyframes */
  @keyframes dotPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }
  @keyframes zonePulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }
  @keyframes lineFadeIn {
    from { opacity: 0; transform: translateX(-4px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes pushDrop {
    from { opacity: 0; transform: translateY(-16px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes auditorIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes barFill {
    from { width: 0%; }
    to { width: 100%; }
  }

  .dot-pulse {
    width: 8px; height: 8px; border-radius: 50%;
    background: #22c88c;
    box-shadow: 0 0 8px #22c88c;
    animation: dotPulse 1.6s ease-in-out infinite;
  }

  :lang(kn) { font-family: 'Noto Sans Kannada', 'Inter', sans-serif; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="scenarios.js"></script>
  <script src="compose.js"></script>
  <script type="text/babel" src="stadium-map.jsx"></script>
  <script type="text/babel" src="agent-stream.jsx"></script>
  <script type="text/babel" src="broadcast-dock.jsx"></script>
  <script type="text/babel" src="team-channels.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
